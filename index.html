<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ceba-projeto.github.io</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }

        body { display: flex; height: 100vh; background-color: #fff; overflow-x: hidden; }

        /* BOTÃO PARA ABRIR O MENU (FIXO NO TOPO) */
        .menu-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: #000;
            color: #fff;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
        }

        /* SIDEBAR QUE ESCONDE */
        .sidebar {
            width: 280px;
            height: 100vh;
            background-color: #f0f0f0;
            border-right: 2px solid #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 70px;
            position: fixed;
            left: -280px; /* COMEÇA ESCONDIDA */
            transition: 0.4s ease; /* EFEITO DE DESLIZAR */
            z-index: 999;
        }

        /* QUANDO O MENU ESTÁ ATIVO */
        .sidebar.active {
            left: 0;
        }

        .perfil-foto {
            width: 120px;
            height: 120px;
            border: 2px solid #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .nome-usuario {
            width: 100%;
            text-align: center;
            border-top: 2px solid #000;
            border-bottom: 2px solid #000;
            padding: 10px 0;
            font-weight: bold;
        }

        .nav-links { width: 100%; display: flex; flex-direction: column; }

        .link-interativo {
            padding: 15px;
            text-align: center;
            text-decoration: none;
            color: #000;
            border-bottom: 1px solid #ccc;
            transition: 0.3s;
        }

        .link-interativo:hover { background-color: #ddd; }

        /* ÁREA DE CONTEÚDO */
        .main-content {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-left: 0;
            transition: 0.4s;
            width: 100%;
        }
    </style>
</head>
<body>

    <button class="menu-toggle" onclick="toggleMenu()">MENU ☰</button>

    <aside class="sidebar" id="sidebar">
        <div class="perfil-foto">foto</div>
        <div class="nome-usuario">antony</div>
        
        <nav class="nav-links">
            <a href="#" class="link-interativo">interativo 1</a>
            <a href="#" class="link-interativo">interativo 2</a>
            <a href="#" class="link-interativo">interativo 3</a>
            <a href="#" class="link-interativo">interativo 4</a>
            <a href="#" class="link-interativo">interativo 5</a>
            <a href="#" class="link-interativo">interativo 6</a>
            <a href="#" class="link-interativo">interativo 7</a>
        </nav>
    </aside>

    <main class="main-content">
        <h2>Clique no botão para ver o menu</h2>
    </main>

    <script>
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('active');
            
            // Mudar o texto do botão
            const btn = document.querySelector('.menu-toggle');
            if(sidebar.classList.contains('active')) {
                btn.innerHTML = 'FECHAR ✕';
            } else {
                btn.innerHTML = 'MENU ☰';
            }
        }
    </script>

</body>
</html>
