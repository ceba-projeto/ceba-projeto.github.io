<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ceba-projeto.github.io</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }

        body { background-color: #fff; display: flex; }

        /* ÁREA DO BOTÃO COM A LINHA SEPARADORA */
        .header-toggle {
            position: fixed;
            top: 0;
            left: 0;
            width: 60px; /* Largura da área do botão */
            height: 100vh;
            border-right: 2px solid #000; /* A LINHA QUE VOCÊ PEDIU */
            display: flex;
            justify-content: center;
            padding-top: 15px;
            background: #fff;
            z-index: 1001;
        }

        .menu-icon {
            font-size: 35px;
            cursor: pointer;
            line-height: 1;
        }

        /* BARRA LATERAL (SIDEBAR) */
        .sidebar {
            height: 100vh;
            width: 250px;
            position: fixed;
            top: 0;
            left: -250px; 
            background-color: #fff;
            border-right: 2px solid #000;
            transition: 0.3s ease;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            padding-top: 60px;
        }

        /* QUANDO O MENU ESTIVER ABERTO */
        .sidebar.open {
            left: 0;
        }

        /* ITENS DO MENU */
        .foto-espaco {
            width: 100px;
            height: 100px;
            border: 2px solid #000;
            border-radius: 50%;
            margin: 0 auto 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .nome-barra {
            text-align: center;
            border-top: 1px solid #000;
            border-bottom: 1px solid #000;
            padding: 10px 0;
            margin-bottom: 10px;
            font-weight: bold;
            text-transform: lowercase;
        }

        .link-interativo {
            padding: 15px;
            text-decoration: none;
            color: #000;
            border-bottom: 1px solid #eee;
            text-align: center;
            transition: 0.2s;
        }

        .link-interativo:hover { background-color: #f0f0f0; }

        /* ÁREA DE CONTEÚDO PRINCIPAL */
        .main-content {
            margin-left: 60px; /* Abre espaço para não ficar atrás da linha */
            padding: 40px;
            flex-grow: 1;
        }

        /* FUNDO ESCURO AO ABRIR */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.1);
            z-index: 999;
        }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="header-toggle">
        <div class="menu-icon" onclick="toggleMenu()">☰</div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <aside class="sidebar" id="sidebar">
        <div class="foto-espaco">foto</div>
        <div class="nome-barra">antony</div>
        
        <a href="#" class="em breve">interativo</a>
        <a href="#" class="em breve">interativo</a>
        <a href="#" class="em breve">interativo</a>
        <a href="#" class="em breve">interativo</a>
        <a href="#" class="<a href="https://wa.me/5522981584972?text=Ola,%20vim%20pelo%20seu%20site" target="_blank" class="link-interativo">Falar no WhatsApp</a>"">interativo</a>
    </aside>

    <main class="main-content">
        <h1>Conteúdo do Site</h1>
        <p>A linha agora separa o botão de menu da área principal.</p>
    </main>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }
    </script>

</body>
</html>
