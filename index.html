<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ceba-projeto.github.io</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #fff; display: flex; overflow-x: hidden; }

        /* BARRA LATERAL E LINHA SEPARADORA */
        .header-toggle {
            position: fixed;
            top: 0;
            left: 0;
            width: 60px;
            height: 100vh;
            border-right: 2px solid #000;
            display: flex;
            justify-content: center;
            padding-top: 15px;
            background: #fff;
            z-index: 1001;
        }

        .menu-icon { font-size: 35px; cursor: pointer; line-height: 1; }

        /* SIDEBAR */
        .sidebar {
            height: 100vh;
            width: 250px;
            position: fixed;
            top: 0;
            left: -250px; 
            background-color: #fff;
            border-right: 2px solid #000;
            transition: 0.3s ease;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            padding-top: 60px;
        }

        .sidebar.open { left: 0; }

        .foto-espaco {
            width: 100px; height: 100px;
            border: 2px solid #000; border-radius: 50%;
            margin: 0 auto 20px auto;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold;
        }

        .nome-barra {
            text-align: center; border-top: 1px solid #000; border-bottom: 1px solid #000;
            padding: 10px 0; margin-bottom: 10px; font-weight: bold;
        }

        .link-interativo {
            padding: 15px; text-decoration: none; color: #000;
            border-bottom: 1px solid #eee; text-align: center; cursor: pointer; transition: 0.2s;
        }

        .link-interativo:hover { background-color: #f0f0f0; }

        /* CONTEÚDO DA PÁGINA */
        .main-content {
            margin-left: 60px; padding: 40px; flex-grow: 1;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; height: 100vh;
        }

        /* ÁREA DO MENSAGEIRO (ESCONDIDA POR PADRÃO) */
        #messenger-area {
            display: none; /* COMEÇA ESCONDIDO */
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .oval-input-container {
            width: 85%; max-width: 500px;
            border: 2px solid #000; border-radius: 50px;
            padding: 5px; display: flex; align-items: center; margin-bottom: 20px;
        }

        .oval-input {
            flex-grow: 1; border: none; padding: 15px 25px;
            border-radius: 50px; font-size: 16px; outline: none;
        }

        .send-button {
            background-color: #25D366; color: #fff; border: none;
            padding: 15px 35px; border-radius: 30px;
            font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }

        .send-button:hover { background-color: #128C7E; transform: scale(1.05); }

        .overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.1); z-index: 999;
        }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="header-toggle">
        <div class="menu-icon" onclick="toggleMenu()">☰</div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <aside class="sidebar" id="sidebar">
        <div class="foto-espaco">foto</div>
        <div class="nome-barra">antony</div>
        
        <div class="link-interativo" onclick="showMessenger()">Enviar Mensagem</div>
        
        <a href="#" class="link-interativo">Em breve</a>
        <a href="#" class="link-interativo">Em breve</a>
        <a href="#" class="link-interativo">Em breve</a>

        <a href="https://wa.me/5522999776700?text=Ola" target="_blank" class="link-interativo" style="font-weight: bold; color: #25D366;">WhatsApp Direct</a>
    </aside>

    <main class="main-content">
        <h2 id="welcome-msg">Selecione uma opção no menu</h2>

        <div id="messenger-area">
            <div class="oval-input-container">
                <input type="text" id="user-message" class="oval-input" placeholder="Escreva sua mensagem...">
            </div>
            <button class="send-button" onclick="sendWhatsAppMessage()">Enviar para o WhatsApp</button>
        </div>
    </main>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        // MOSTRAR O MENSAGEIRO
        function showMessenger() {
            document.getElementById('messenger-area').style.display = 'flex';
            document.getElementById('welcome-msg').style.display = 'none';
            toggleMenu(); // Fecha o menu automaticamente ao selecionar
        }

        function sendWhatsAppMessage() {
            const message = document.getElementById('user-message').value;
            const phoneNumber = "5522999776700";
            const encodedMessage = encodeURIComponent(message);
            window.open(`https://wa.me/${phoneNumber}?text=${encodedMessage}`, '_blank');
        }
    </script>

</body>
</html>
