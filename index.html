<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ceba-projeto.github.io</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }

        body { background-color: #fff; overflow-x: hidden; }

        /* ÍCONE DE MENU (AS 3 BARRINHAS) */
        .menu-icon {
            font-size: 30px;
            cursor: pointer;
            padding: 10px;
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: #fff;
            border: 1px solid #000;
            line-height: 1;
        }

        /* BARRA LATERAL (SIDEBAR) */
        .sidebar {
            height: 100vh;
            width: 250px;
            position: fixed;
            top: 0;
            left: -250px; /* TOTALMENTE ESCONDIDO À ESQUERDA */
            background-color: #fff;
            border-right: 2px solid #000;
            transition: 0.3s ease; /* DESLIZAMENTO SUAVE */
            z-index: 999;
            display: flex;
            flex-direction: column;
            padding-top: 60px;
        }

        /* QUANDO O MENU ESTIVER ABERTO */
        .sidebar.open {
            left: 0;
        }

        /* ITENS DENTRO DO MENU */
        .foto-espaco {
            width: 100px;
            height: 100px;
            border: 2px solid #000;
            border-radius: 50%;
            margin: 0 auto 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .nome-barra {
            text-align: center;
            border-top: 1px solid #000;
            border-bottom: 1px solid #000;
            padding: 10px 0;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .link-interativo {
            padding: 15px;
            text-decoration: none;
            color: #000;
            border-bottom: 1px solid #eee;
            text-align: center;
            transition: 0.2s;
        }

        .link-interativo:hover {
            background-color: #f0f0f0;
        }

        /* FUNDO ESCURO QUANDO O MENU ABRE (OPCIONAL) */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.2);
            z-index: 998;
        }

        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="menu-icon" onclick="toggleMenu()">☰</div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <aside class="sidebar" id="sidebar">
        <div class="foto-espaco">foto</div>
        <div class="nome-barra">antony</div>
        
        <a href="#" class="link-interativo">interativo</a>
        <a href="#" class="link-interativo">interativo</a>
        <a href="#" class="link-interativo">interativo</a>
        <a href="#" class="link-interativo">interativo</a>
        <a href="#" class="link-interativo">interativo</a>
        <a href="#" class="link-interativo">interativo</a>
    </aside>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }
    </script>

</body>
</html>
